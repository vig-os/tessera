# CI Workflow
#
# Runs automated code quality checks and tests on pull requests.
# Default template for Python projects using the vigOS devcontainer.
#
# Jobs:
#   1. lint              — Pre-commit hooks (Ruff, yamllint, pymarkdown, shellcheck, etc.)
#   2. test              — Pytest with coverage
#   3. rust-test         — Rust formatting, linting (clippy), and tests
#   4. c-build           — C library build and CTest
#   5. security          — Python security scanning (Bandit)
#   6. dependency-review — Dependency vulnerability check (PRs only)
#   7. summary           — Aggregate results for branch protection
#
# Triggers:
#   - Pull requests to dev, release/**, and main (runs all checks)
#   - Manual workflow_dispatch (select specific suite to run)
#

name: CI

on:  # yamllint disable-line rule:truthy
  pull_request:
    branches:
      - dev
      - 'release/**'
      - main
  workflow_dispatch:
    inputs:
      test-suite:
        description: 'Test suite to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - lint
          - test
          - security

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    if: |
      github.event_name != 'workflow_dispatch' ||
      inputs.test-suite == 'all' ||
      inputs.test-suite == 'lint'

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up environment
        uses: ./.github/actions/setup-env
        with:
          sync-dependencies: 'true'

      - name: Run pre-commit hooks
        env:
          SKIP: check-action-pins,validate-commit-msg
        run: uv run pre-commit run --all-files --show-diff-on-failure

  test:
    name: Tests
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    if: |
      github.event_name != 'workflow_dispatch' ||
      inputs.test-suite == 'all' ||
      inputs.test-suite == 'test'

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up environment
        uses: ./.github/actions/setup-env
        with:
          sync-dependencies: 'true'

      - name: Run tests with coverage
        run: uv run pytest --cov --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30
          if-no-files-found: ignore

  rust-test:
    name: Rust Tests
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --all

  c-build:
    name: C Library Build & Test
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libhdf5-dev

      - name: Build
        run: |
          cd lib/c
          mkdir -p build
          cd build
          cmake ..
          make

      - name: Test
        run: |
          cd lib/c/build
          ctest --output-on-failure

  security:
    name: Security Scan
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    if: |
      github.event_name != 'workflow_dispatch' ||
      inputs.test-suite == 'all' ||
      inputs.test-suite == 'security'

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up environment
        uses: ./.github/actions/setup-env
        with:
          sync-dependencies: 'true'

      - name: Install safety
        run: uv pip install safety==3.2.11

      - name: Run Bandit (Python security linting)
        id: bandit
        run: |
          uv run bandit -r src/ -ll -f json -o bandit-report.json || true
          echo "Bandit scan completed"

      - name: Run Safety (dependency vulnerability check)
        id: safety
        run: |
          safety check --json > safety-report.json || true
          echo "Safety scan completed"

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json
          retention-days: 30
          if-no-files-found: ignore

      - name: Report Bandit findings
        if: always() && steps.bandit.outcome == 'success'
        run: |
          if [ -f bandit-report.json ]; then
            echo "## Security: Bandit" >> $GITHUB_STEP_SUMMARY
            python -m json.tool bandit-report.json | head -50 >> $GITHUB_STEP_SUMMARY || true
          fi

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Review dependencies for vulnerabilities
        uses: actions/dependency-review-action@3c4e3dcb1aa7874d2c16be7d79418e9b7efd6261  # v4
        with:
          fail-on-severity: high

  summary:
    name: CI Summary
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    needs: [lint, test, rust-test, c-build, security, dependency-review]
    if: always()

    steps:
      - name: Check results
        run: |
          echo "CI Results Summary"
          echo "==================="
          echo ""
          echo "Lint:              ${{ needs.lint.result }}"
          echo "Test:              ${{ needs.test.result }}"
          echo "Rust Test:         ${{ needs.rust-test.result }}"
          echo "C Build:           ${{ needs.c-build.result }}"
          echo "Security:          ${{ needs.security.result }}"
          echo "Dependency Review: ${{ needs.dependency-review.result }}"
          echo ""

          FAILED=false

          if [ "${{ needs.lint.result }}" = "failure" ]; then
            echo "ERROR: Lint checks failed"
            FAILED=true
          fi

          if [ "${{ needs.test.result }}" = "failure" ]; then
            echo "ERROR: Tests failed"
            FAILED=true
          fi

          if [ "${{ needs.rust-test.result }}" = "failure" ]; then
            echo "ERROR: Rust tests failed"
            FAILED=true
          fi

          if [ "${{ needs.c-build.result }}" = "failure" ]; then
            echo "ERROR: C build/test failed"
            FAILED=true
          fi

          if [ "${{ needs.security.result }}" = "failure" ]; then
            echo "ERROR: Security scan failed"
            FAILED=true
          fi

          if [ "${{ needs.dependency-review.result }}" = "failure" ]; then
            echo "ERROR: Dependency review failed"
            FAILED=true
          fi

          if [ "$FAILED" = "true" ]; then
            echo ""
            echo "One or more checks failed"
            exit 1
          fi

          echo ""
          echo "All executed checks passed"
