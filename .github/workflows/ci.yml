# CI Workflow
#
# Dependency vulnerability review on pull requests.
#
# NOTE: the legacy "vigOS Python template" jobs (pre-commit lint, pytest-cov, bandit) were removed
# together with the root `fd5` scaffold they tested — that scaffold predates Tessera and tested
# nothing real. Tessera's actual gate is `nix flake check` (workspace clippy/test/fmt, wasm, OCI/WORM
# roundtrips, guardrails), which lives on the development branch.
#
# Jobs:
#   1. dependency-review — Dependency vulnerability check (PRs only)
#   2. summary           — Aggregate result for branch protection
#

name: CI

on:  # yamllint disable-line rule:truthy
  pull_request:
    branches:
      - dev
      - 'release/**'
      - main

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Review dependencies for vulnerabilities
        uses: actions/dependency-review-action@3c4e3dcb1aa7874d2c16be7d79418e9b7efd6261  # v4
        with:
          fail-on-severity: high

  summary:
    name: CI Summary
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    needs: [dependency-review]
    if: always()

    steps:
      - name: Check results
        run: |
          echo "CI Results Summary"
          echo "==================="
          echo "Dependency Review: ${{ needs.dependency-review.result }}"
          echo ""

          if [ "${{ needs.dependency-review.result }}" = "failure" ]; then
            echo "ERROR: Dependency review failed"
            exit 1
          fi

          echo "All executed checks passed"
