# CI — a shim over `nix flake check`.
#
# The logic lives in the flake's `checks` (flake.nix), so the SAME command runs on a dev's
# machine and here — no "passes locally / fails in CI" drift, nothing to reproduce by hand.
# Run it yourself: `nix flake check -L`.
#
# Checks (see flake.nix): workspace-clippy · workspace-test · workspace-fmt ·
# guardrails-gates · dev-shell. cargo-deny + the full pre-commit gate set run via `prek`
# locally (they need network / the working tree).
#
# vig-os/tessera is PUBLIC → GitHub-hosted runner. Never self-hosted on a public repo (untrusted
# PRs = arbitrary code execution on your hardware). See guardrails docs/CONVENTIONS.md.
#
# CROSS-ARCH DETERMINISM GATE (ADR-0020/0024 release gate). The flake is `eachDefaultSystem`, so the
# checks already exist for aarch64-linux. Running `nix flake check` on BOTH `ubuntu-latest`
# (x86_64-linux) and `ubuntu-24.04-arm` (aarch64-linux — a GitHub-HOSTED ARM64 runner, free for public
# repos, so the no-self-hosted rule holds) makes the conformance gate
# (`tessera-io/tests/conformance.rs`) re-derive the golden id/content_hash/manifest_hash and the
# byte-identical `.tsra` on EACH arch. Green on both = the content-addressing is byte-reproducible
# x86==ARM — the writer-determinism property the spec stakes identity on, validated not assumed.
# `fail-fast: false` so a drift on one arch still reports the other.

name: CI

on:  # yamllint disable-line rule:truthy
  pull_request:
    branches:
      - dev
      - 'release/**'
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: nix flake check (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60  # a cold aarch64 build of the vortex/zarrs stack runs longer than x86
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64-linux
            runner: ubuntu-latest
          - arch: aarch64-linux
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25  # v22

      - name: nix flake check
        run: nix flake check -L
