[workspace]
resolver = "2"
members = ["crates/tessera-core"]

[workspace.package]
edition = "2021"
license = "Apache-2.0"
version = "0.0.0"
repository = "https://github.com/vig-os/fd5"
authors = ["vig-os"]

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
blake3 = "1"
thiserror = "2"
# storage-backend crates (zarrs / arrow / parquet / lance) get added to the workspace
# when the array/table block payloads are actually implemented — see docs/rfc-tessera.md §6.
