[workspace]
resolver = "2"
members = ["crates/tessera-core", "crates/tessera-io"]

[workspace.package]
edition = "2021"
license = "Apache-2.0"
version = "0.0.0"
repository = "https://github.com/vig-os/tessera"
authors = ["vig-os"]

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_jcs = "0.2"          # RFC 8785 JSON Canonicalization Scheme — reproducible hashing
blake3 = "1"
thiserror = "2"
time = { version = "0.3", features = ["parsing", "formatting"] }
proptest = "1"
zip = { version = "2", default-features = false }   # STORED zip64 `.tsra` container (no compression deps)
tessera-core = { path = "crates/tessera-core" }
# storage-backend crates (zarrs / arrow / parquet / lance) get added to the workspace
# when the array/table block payloads are actually implemented — see docs/rfc-tessera.md §6.
