# cargo-deny — dependency licenses + RUSTSEC advisories for the Tessera workspace.
# Wired in ../.pre-commit-config.yaml (the cargo-deny gate cd's into tessera/ before running).
# Baseline from gerchowl/guardrails: permissive OSI allow-list, advisories deny-by-default with
# an explicit, auditable `ignore` list. Tessera itself is Apache-2.0 (already allowed).

[advisories]
version = 2
yanked = "warn"
ignore = [
    # paste v1.0.15 — UNMAINTAINED (not a vulnerability). A compile-time-only proc-macro pulled
    # transitively by zarrs/pcodec (zarrs_plugin/_data_type/_codec); "no safe upgrade available"
    # since zarrs depends on it. No runtime attack surface. Revisit when zarrs drops paste.
    "RUSTSEC-2024-0436",
    # encoding v0.2.33 — UNMAINTAINED (not a vulnerability). A legacy text-codec crate pulled
    # transitively by dicom-encoding (charset decoding of DICOM string VRs). No safe upgrade
    # while dicom 0.9 depends on it. Revisit when dicom migrates to `encoding_rs`.
    "RUSTSEC-2021-0153",
]

[licenses]
version = 2
confidence-threshold = 0.8
private = { ignore = true }   # don't license-gate first-party (publish=false) crates
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
  "MPL-2.0",
  "CC0-1.0",
  "0BSD",
  "BSL-1.0",
  # jpeg-encoder (via dicom-transfer-syntax-registry) — the Independent JPEG Group license,
  # classified FSF Free/Libre. Standard JPEG reference license; acceptable for an OSI/FAIR stack.
  "IJG",
]

[bans]
multiple-versions = "allow"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "allow"
